server:
  port: 8123
  servlet:
    context-path: /api
    session:
      cookie:
        max-age: 604800
  tomcat:
    max-connections: 8192
    accept-count: 100
    connection-timeout: 20000
    threads:
      max: 200

spring:
  application:
    name: agent-application-creator
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
      enabled: true
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/xiaorui_app_creator?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
  session:
    redis:
      namespace: ${SPRING_SESSION_REDIS_NAMESPACE:agent-app:session}
      flush-mode: on_save
      save-mode: always
  mail:
    username: ${SPRING_MAIL_USERNAME:368649957@qq.com}
    password: ${SPRING_MAIL_PASSWORD:ozxbkjocwsaicbag}
    host: ${SPRING_MAIL_HOST:smtp.qq.com}
    port: ${SPRING_MAIL_PORT:465}
  security:
    user:
      name: ${SPRING_SECURITY_USER_NAME:xiaorui}
      password: ${SPRING_SECURITY_USER_PASSWORD:123456}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:127.0.0.1}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      database: ${SPRING_DATA_REDIS_DATABASE:0}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 50
          max-idle: 20
          min-idle: 10
          max-wait: 10000ms
        shutdown-timeout: 200ms
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:sk-b1aea9f904d6478db3fa8bf439a1a460}
      chat:
        options:
          model: ${DASHSCOPE_CHAT_MODEL:qwen3-coder-plus}
          stream: true
          incremental-output: true
          temperature: ${DASHSCOPE_CHAT_TEMPERATURE:0.1}

sa-token:
  token-name: Authorization
  timeout: 2592000
  is-concurrent: false
  is-share: false
  token-style: uuid
  is-log: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: "default"
      paths-to-match: "/**"
      packages-to-scan: com.xiaorui.agentapplicationcreator.controller

knife4j:
  enable: true
  setting:
    language: zh_cn

minio:
  endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
  access-key: ${MINIO_ACCESS_KEY:xiaorui}
  secret-key: ${MINIO_SECRET_KEY:18656412886ty}
  default-bucket: ${MINIO_DEFAULT_BUCKET:agent-app-creator-bucket}

sftp:
  host: ${SFTP_HOST:172.19.48.249}
  port: ${SFTP_PORT:22}
  username: ${SFTP_USERNAME:root}
  password: ${SFTP_PASSWORD:123456}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

app:
  storage:
    code-output-dir: ${APP_CODE_OUTPUT_DIR:${user.dir}/tmp/code_output}
    code-deploy-dir: ${APP_CODE_DEPLOY_DIR:${user.dir}/tmp/code_deploy}
    code-version-dir: ${APP_CODE_VERSION_DIR:${user.dir}/tmp/code_version}
    code-template-dir: ${APP_CODE_TEMPLATE_DIR:${user.dir}/tmp/code_template}
  deploy:
    public-base-url: ${APP_DEPLOY_PUBLIC_BASE_URL:http://172.19.48.249}
    remote-dir: ${APP_REMOTE_DEPLOY_DIR:/home/xiaorui/nginx/code_deploy/}
  cors:
    api:
      allowed-origin-patterns:
        - ${APP_CORS_API_ALLOWED_ORIGIN_1:http://localhost:*}
        - ${APP_CORS_API_ALLOWED_ORIGIN_2:http://127.0.0.1:*}
      allowed-methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      allowed-headers:
        - "*"
      exposed-headers:
        - "*"
      allow-credentials: true
      max-age: 3600
    statics:
      allowed-origin-patterns:
        - ${APP_CORS_STATIC_ALLOWED_ORIGIN_1:http://localhost:*}
        - ${APP_CORS_STATIC_ALLOWED_ORIGIN_2:http://127.0.0.1:*}
      allowed-methods:
        - GET
        - HEAD
        - OPTIONS
      allowed-headers:
        - "*"
      exposed-headers:
        - "*"
      allow-credentials: false
      max-age: 3600
